<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- FAVICON (Browser Tab Icon) -->
    <!-- Keep using logo.png here, it's fine for small tabs -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PRIMARY META TAGS -->
    <title>Playstorm Esports Club</title>
    <meta name="title" content="Playstorm eSports Club" />
    <meta name="description" content="Amity University Noida's Official Esports Club. Join the storm for competitive gaming, community events, and tournaments." />

    <!-- OPEN GRAPH / FACEBOOK / WHATSAPP -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://playstorm.world/" />
    <meta property="og:title" content="Playstorm eSports Club" />
    <meta property="og:description" content="Amity University Noida's Official Esports Club. Join the storm for competitive gaming, community events, and tournaments." />
    
    <!-- 
      FIXED: Pointing to a high-res image for WhatsApp/Socials. 
      Make sure to upload a 1200x630px image named 'social-preview.png' to your public/ folder.
    -->
    <meta property="og:image" content="/social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- TWITTER -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://playstorm.world/" />
    <meta property="twitter:title" content="Playstorm eSports Club" />
    <meta property="twitter:description" content="Amity University Noida's Official Esports Club. Join the storm for competitive gaming, community events, and tournaments." />
    <meta property="twitter:image" content="/social-preview.png" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
